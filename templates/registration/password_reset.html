<!-- culture/templates/registration/password_reset.html -->
<!DOCTYPE html>
<html>
<head>
<title>Forgot Password | Indian Cultural Atlas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#fdfcfb,#e2d1c3);
    min-height:100vh;
}

.brand-title{
    font-weight:700;
    letter-spacing:1px;
}

.brand-sub{
    color:#6c757d;
}

.reset-card{
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<!-- Header -->
<div class="text-center pt-5 mb-4">

<h2 class="brand-title">🇮🇳 Indian Cultural Atlas</h2>

<p class="brand-sub">
Explore the rich culture, heritage and traditions of India
</p>

</div>


<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow-lg reset-card p-4">

<h4 class="text-center fw-bold mb-3">
Forgot Password
</h4>

<p class="text-muted text-center mb-4">
Enter your email address and we will send you a password reset link.
</p>

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label class="form-label fw-semibold">
Email Address
</label>

{{ form.email }}

</div>

<div class="d-grid">

<button type="submit" class="btn btn-primary btn-lg rounded-3">
Send Reset Email
</button>

</div>

</form>

<div class="text-center mt-3">

<a href="{% url 'login' %}" class="text-decoration-none">
Back to Login
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
