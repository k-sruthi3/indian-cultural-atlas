<!--  culture/templates/registration/password_reset.html -->

<!DOCTYPE html>

<html>
<head>
    <title>Forgot Password - Indian Cultural Atlas</title>

</br>
</br>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body style="background:#f5f5f5;">

<div class="container">

<div class="text-center mt-5">
    <h2>🇮🇳 Indian Cultural Atlas</h2>
    <p>Explore the rich culture, heritage and traditions of India</p>
</div>

<div class="row justify-content-center mt-4">
    <div class="col-md-5">

        <div class="card shadow p-4">

            <h4 class="text-center mb-3">Forgot Password</h4>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Email</label>
                    {{ form.email }}
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Send Reset Email
                    </button>
                </div>

            </form>

        </div>

    </div>
</div>


</div>

</body>
</html>
