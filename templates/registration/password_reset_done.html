<!DOCTYPE html>

<html>
<head>
    <title>Password Reset Email Sent</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6f9;">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">


<div class="card shadow p-5 text-center" style="width:420px; border-radius:12px;">

    <h3 class="mb-3 text-success">Email Sent</h3>

    <p class="text-muted">
        We have emailed you instructions for resetting your password.
        Please check your inbox or spam folder.
    </p>

    <a href="{% url 'login' %}" class="btn btn-primary mt-3">
        Back to Login
    </a>

</div>


</div>

</body>
</html>
