<!-- culture/templates/profile.html -->
{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg p-4">
            <div class="text-center mb-3">
                
     {% if user.profile.profile_picture %}
    <img src="{{ user.profile.profile_picture.url }}"
         width="150"
         height="150"
         style="border-radius:50%; object-fit:cover;">
{% else %}
    <img src="/media/profile_pics/default.png"
         width="150"
         height="150"
         style="border-radius:50%;">
{% endif %}
                <h3>{{ user.username }}</h3>
                <p class="text-muted">{{ user.email }}</p>
            </div>

            <hr>

            <p><strong>Date Joined:</strong> {{ user.date_joined }}</p>

            <div class="d-grid gap-2 mt-4">
                <a href="{% url 'settings' %}" class="btn btn-outline-primary">Account Settings</a>
                <a href="{% url 'delete_account' %}" class="btn btn-outline-danger">Delete Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
