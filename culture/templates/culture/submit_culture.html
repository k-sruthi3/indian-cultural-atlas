 <!-- culture/templates/culture/submit_culture.html -->

{% extends 'base.html' %}

{% block title %}Submit Culture{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">
            Submit Cultural Information
        </h2>

        <form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Submit for Approval
    </button>
</form>

    </div>
</div>

{% endblock %}
