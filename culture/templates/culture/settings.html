<!--culture/templates/ settings.html -->
{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0 p-4">

            <!-- Header -->
            <div class="text-center mb-4">
                {% if user.profile.profile_picture %}
                    <img src="{{ user.profile.profile_picture.url }}"
     class="rounded-circle mb-3"
     style="width: 100px; height: 100px; object-fit: cover;">
                {% else %}
                    <img src="{% static 'images/default.png' %}"
     class="rounded-circle mb-3"
     style="width: 100px; height: 100px; object-fit: cover;">
                {% endif %}
                <h4 class="fw-bold mb-0">Account Settings</h4>
                <small class="text-muted">{{ user.email }}</small>
            </div>

            <hr>

            <!-- Settings Options -->
            <div class="list-group list-group-flush">

                <a href="{% url 'change_password' %}"
                   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                    <div>
                        <span class="fs-5 me-2"></span>
                        <strong>Change Password</strong>
                        <div class="small text-muted">Update your login credentials</div>
                    </div>
                    <span class="text-muted">›</span>
                </a>

                <a href="{% url 'update_profile' %}"
                   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
                    <div>
                        <span class="fs-5 me-2"></span>
                        <strong>Update Profile</strong>
                        <div class="small text-muted">Edit your personal information & photo</div>
                    </div>
                    <span class="text-muted">›</span>
                </a>

            </div>

            <!-- Back Button -->
            <div class="text-center mt-4">
                <a href="{% url 'profile' %}" class="btn btn-outline-secondary px-4">
                    ← Back to Profile
                </a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
