<!-- culture/templates/culture/base_auth.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Indian Cultural Atlas{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* Full-page dynamic background */
        .auth-bg {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .auth-card {
    width: 400px;
    margin: auto;
    padding: 40px;
    border-radius: 15px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
}

.auth-card h2 {
    text-align: center;
    margin-bottom: 30px;
}

.auth-card input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: none;
}

.login-btn {
    width: 100%;
    padding: 10px;
    border: none;
    background: orange;
    color: white;
    border-radius: 5px;
    font-weight: bold;
}

.login-btn:hover {
    background: darkorange;
}

        .auth-bg img.bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .auth-bg img.bg-slide.active {
            opacity: 1;
        }

        /* Auth Card */
        .auth-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #fff;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 30px;
            font-weight: 700;
        }

        .form-control {
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 20px;
        }

        .btn-auth {
            width: 100%;
            border-radius: 50px;
            padding: 10px;
            font-weight: 600;
            background: #f39c12;
            border: none;
            color: #fff;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background: #e67e22;
        }

        .text-center a {
            color: #f39c12;
            text-decoration: none;
        }

        .text-center a:hover {
            text-decoration: underline;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="auth-bg">
        <!-- Background slides -->
        <img class="bg-slide active" src="https://img.freepik.com/premium-vector/indian-culture-background-realistic-style_98292-43806.jpg" alt="slide1">
        <img class="bg-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCRRZ3RlairSpWba45WOpo-hf1lWBMn92iww&s" alt="slide2">
        <img class="bg-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRKzh54gRZGPlji3v9hjsTq_2I_TMq7OdbWTA&s" alt="slide3">
        <img class="bg-slide" src="https://png.pngtree.com/thumb_back/fh260/background/20250224/pngtree-heritage-of-india-with-grunge-orange-background-featuring-cultural-landmarks-image_16903726.jpg" alt="slide4">
        <img class="bg-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSI8qdogkBkprpKmiqc7uWHzY7jxU9AxcPssQ&s" alt="slide5">
        {% block content %}{% endblock %}
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Background slideshow
    const slides = document.querySelectorAll('.bg-slide');
    let current = 0;

    function showNextSlide() {
        slides[current].classList.remove('active');
        current = (current + 1) % slides.length;
        slides[current].classList.add('active');
    }

    // Change image every 5 seconds
    setInterval(showNextSlide, 5000);
</script>
</body>
</html>
