<!-- culture/templates/culture/register.html -->
{% extends 'culture/base_auth.html' %}
{% block title %}Register - Indian Cultural Atlas{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Create Account</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-warning text-dark">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" class="form-control" required>
        <input type="email" name="email" placeholder="Email" class="form-control" required>
        <input type="password" name="password1" placeholder="Password" class="form-control" required>
        <input type="password" name="password2" placeholder="Confirm Password" class="form-control" required>
        <button type="submit" class="btn btn-auth">Register</button>
    </form>

    <div class="text-center mt-3">
        <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</div>
{% endblock %}
