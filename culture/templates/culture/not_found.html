<!-- culture/templates/not_found.html -->
{% extends "base.html" %}
{% block content %}

<style>
.not-found-container {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.not-found-box {
    text-align: center;
    max-width: 500px;
}

.not-found-title {
    font-size: 60px;
    color: #e74c3c;
    margin-bottom: 10px;
}

.not-found-subtitle {
    margin-bottom: 15px;
}

.not-found-text {
    color: gray;
    margin-bottom: 25px;
}

.not-found-btn {
    background: #2c3e50;
    color: white;
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.not-found-btn:hover {
    background: #1a252f;
}
</style>

<div class="not-found-container">
    <div class="not-found-box">
        
        <h1 class="not-found-title">404</h1>

        <h2 class="not-found-subtitle">No Results Found</h2>

        <p class="not-found-text">
            Sorry, we could not find anything for 
            <strong>"{{ query }}"</strong>.
            
        </p>

        {% if user.is_authenticated %}
    <a href="{% url 'home' %}" class="btn btn-primary">Go Back Home</a>
{% else %}
    <a href="{% url 'login' %}" class="btn btn-primary">Login</a>
{% endif %}

    </div>
</div>

{% endblock %}
